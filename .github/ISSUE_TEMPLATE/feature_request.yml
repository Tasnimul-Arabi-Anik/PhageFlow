name: Feature request
description: Suggest a new PhageFlow software feature, optional module, or report improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: Describe the workflow or reporting gap.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed feature
      description: Explain the software behavior, inputs, outputs, and validation needs.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - core workflow
        - optional module
        - report or packaging
        - validation
        - documentation
    validations:
      required: true
  - type: textarea
    id: reproducibility
    attributes:
      label: Reproducibility considerations
      description: Note required local databases, external tools, or network dependencies.
    validations:
      required: false
